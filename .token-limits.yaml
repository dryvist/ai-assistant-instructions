# Token Limit Configuration
# Enforces maximum token counts for files to prevent context bloat
# Hard blocks at commit and merge time

# Global defaults
defaults:
  max_tokens: 2000

# File-specific limits
limits:
  # Always-loaded entry point — keep the per-session cost low
  AGENTS.md: 1000

  # Rules and documentation
  agentsmd/rules/*.md: 2000
  agentsmd/docs/*.md: 3000

  # Workflows
  agentsmd/workflows/*.md: 2000

# Violation policy
policy:
  # Hard block at commit time
  pre_commit: hard_block

  # Hard block at PR merge time
  pr_merge: hard_block

  # Warning threshold (warn but don't block)
  warning_threshold: 0.9  # Warn when file is 90% of limit

# Refactoring strategies previously listed here targeted command files
# (resolve-pr-threads, delegate-to-ai, respond-all-prs, auto-maintain) that
# have been decommissioned from this repo. Commands now live in
# JacobPEvans/claude-code-plugins; their token budgets are owned there.
