# Claude Code Lint - Push to main/develop wrapper
# PRs are validated via ci-gate.yml

name: Claude Code Lint

on:
  push:
    branches: [main, develop]
    paths:
      - '.claude/**'
      - 'agentsmd/**'
      - 'CLAUDE.md'
      - '.cclintrc.jsonc'

permissions:
  contents: read

jobs:
  cclint:
    uses: ./.github/workflows/_cclint.yml
