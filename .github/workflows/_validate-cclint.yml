# Reusable workflow for cclint schema/config validation
# Called by: ci-gate.yml (PRs), validate-cclint-schema.yml (push to main)
#
# Contains 2 jobs:
# 1. check-cclint-config - Verifies cclint configuration syntax
# 2. final-cclint-check - Runs cclint validation

name: Schema Validation (Reusable)

on:
  workflow_call:
    inputs:
      # When called via workflow_call, github.event_name is "workflow_call"
      # Caller must pass the original event context for PR-specific logic
      caller_event:
        description: "Original event type from calling workflow (pull_request, push, etc.)"
        type: string
        required: false
        default: "push"
      pr_number:
        description: "PR number for posting comments (only needed for pull_request events)"
        type: number
        required: false
        default: 0

jobs:
  check-cclint-config:
    name: "Verify cclint Configuration"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: Validate cclintrc.jsonc syntax
        run: |
          npm install jsonc-parser --no-save
          node -e "
          const fs = require('fs');
          const { parseTree } = require('jsonc-parser');
          try {
            const content = fs.readFileSync('.cclintrc.jsonc', 'utf8');
            parseTree(content);
            console.log('✅ .cclintrc.jsonc is valid');
          } catch (e) {
            console.error('❌ Invalid .cclintrc.jsonc syntax:', e.message);
            process.exit(1);
          }
          "

      - name: Verify schema URL is accessible
        run: |
          SCHEMA_URL=$(grep -o '"$schema": "[^"]*' .cclintrc.jsonc | cut -d'"' -f4)
          echo "Schema URL: ${SCHEMA_URL}"
          if curl -sf "${SCHEMA_URL}" > /dev/null 2>&1; then
            echo "✅ Schema URL is accessible"
          else
            echo "⚠️  Schema URL might be inaccessible (could be network issue)"
          fi

  final-cclint-check:
    name: "Run cclint on .claude Files"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    needs: check-cclint-config
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: Run cclint
        # renovate: datasource=npm depName=@carlrannaberg/cclint
        run: npx @carlrannaberg/cclint@0.2.10 --verbose
