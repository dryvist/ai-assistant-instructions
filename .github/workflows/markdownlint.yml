# Markdown Lint - Push to main/develop wrapper
# PRs are validated via ci-gate.yml

name: Markdown Lint

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.md'
      - '.markdownlint-cli2.jsonc'

permissions:
  contents: read

jobs:
  markdownlint:
    uses: dryvist/.github/.github/workflows/_markdown-lint.yml@main
