# Token Limit Check - Push to main wrapper
# PRs are validated via ci-gate.yml

name: Token Limit Check

on:
  push:
    branches: [main]
    paths:
      - '.claude/**'
      - 'agentsmd/**'
      - '**/*.md'

permissions:
  contents: read

jobs:
  token-limits:
    uses: dryvist/.github/.github/workflows/_token-limits.yml@main
