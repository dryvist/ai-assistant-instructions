name: Issue Auto-Resolve

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to resolve"
        required: true
        type: string
  issues:
    types: [opened]

permissions:
  actions: write
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: issue-auto-resolve-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  dispatch:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
    steps:
      - name: Dispatch as workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: gh workflow run "$WORKFLOW_NAME" --repo "$REPO" -f issue_number="$ISSUE_NUM"

  run-triage:
    if: github.event_name == 'workflow_dispatch'
    uses: dryvist/ai-workflows/.github/workflows/issue-triage.yml@main
    secrets: inherit
    with:
      issue_number: ${{ inputs.issue_number }}

  resolve-issue:
    if: false
    needs: [run-triage]
    uses: dryvist/ai-workflows/.github/workflows/issue-resolver.yml@main
    secrets: inherit
    with:
      repo_context: "AI assistant instruction files and CLAUDE.md patterns for multi-model orchestration"
      issue_number: ${{ inputs.issue_number }}

  add-ready-label:
    needs: [run-triage]
    if: >-
      always() &&
      github.event_name == 'workflow_dispatch' &&
      (needs.run-triage.result == 'success' || needs.run-triage.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout ai-assistant-instructions scripts
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts
          path: .repo-scripts

      - name: Add ai:ready label if eligible
        uses: actions/github-script@v9
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = require('./.repo-scripts/.github/scripts/copilot-pipeline/add-ready-label.js');
            await run({ github, context, core });
