name: Link Check

on:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  link-check:
    name: "Check Links"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Identify symlinks
        id: identify
        run: bash ./scripts/identify-symlinks.sh

      - name: Check for broken symlinks
        if: steps.identify.outputs.has_broken_symlinks == 'true'
        run: |
          echo "::error::Broken symlinks found: ${{ steps.identify.outputs.broken_symlinks }}"
          exit 1

      - name: Check links in regular files
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --verbose
            --no-progress
            --accept '200..=299,301,302,308'
            --exclude 'shields.io'
            --exclude 'github.com/.*/badge'
            --exclude 'gist.github.com'
            ${{ steps.identify.outputs.regular_files }}
          output: lychee/out.md
          fail: true
