# File Size Check - Push to main/develop wrapper
# PRs are validated via ci-gate.yml

name: File Size

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.md'
      - '**/*.nix'
      - '**/*.tf'
      - '.file-size.yml'

permissions:
  contents: read

jobs:
  file-size:
    uses: dryvist/.github/.github/workflows/_file-size.yml@main
