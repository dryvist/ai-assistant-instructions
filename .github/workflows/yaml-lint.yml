# YAML Lint - Push to main/develop wrapper
# PRs are validated via ci-gate.yml

name: YAML Lint

on:
  push:
    branches: [main, develop]
    paths:
      - '**/*.yml'
      - '**/*.yaml'
      - '.yamllint.yml'

permissions:
  contents: read

jobs:
  yaml-lint:
    uses: ./.github/workflows/_yaml-lint.yml
