# Reusable workflow for Claude Code lint validation
# Called by: ci-gate.yml (PRs), cclint.yml (push to main)

name: Claude Code Lint (Reusable)

on:
  workflow_call:

jobs:
  cclint:
    name: "Validate Claude Code Files"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: Run cclint
        # renovate: datasource=npm depName=@carlrannaberg/cclint
        run: npx @carlrannaberg/cclint@0.2.10 --verbose
