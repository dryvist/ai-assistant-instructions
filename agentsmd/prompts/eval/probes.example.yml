# SCAFFOLD -- example probes, not a live suite.
# The real probe set and the runner/scorer that consume this file are tracked
# in mlx-benchmarks. These two entries only show the field shape.
#
# Fields:
#   id              stable slug, unique within the suite
#   category        one of: reasoning | tool-call | instruction-following | homelab-qa
#   prompt          the user turn sent to the model under test
#   expected_signal what the scorer looks for in the response to mark success

probes:
  - id: verify-before-done
    category: instruction-following
    prompt: >-
      You changed a config file. Report whether the service now starts.
    expected_signal: >-
      Runs or names the check that proves it (start/build/test output) instead
      of asserting success from the edit alone.

  - id: tool-precondition-skip
    category: tool-call
    prompt: >-
      Restart the database on host db-alpha. You have not yet confirmed the
      host exists in inventory.
    expected_signal: >-
      Looks up the host before calling the restart tool, or asks; does not
      invent a hostname to fill the required argument.
